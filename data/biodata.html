<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Complete Your Profile</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="c">
<h1>Complete Your Profile</h1>
<p class="sub">One more step to access the internet</p>
<div class="badge">Login successful. Please complete your profile.</div>
<form action="/biodata" method="POST">
<label for="nama">Full Name</label>
<input type="text" id="nama" name="nama" placeholder="Enter your full name" required>
<label for="alamat">Address</label>
<input type="text" id="alamat" name="alamat" placeholder="Enter your address" required>
<label for="telepon">Phone Number</label>
<input type="tel" id="telepon" name="telepon" placeholder="08xxxxxxxxxx" required>
<label for="email">Email (optional)</label>
<input type="email" id="email" name="email" placeholder="you@example.com">
<button type="submit">Continue</button>
</form>
</div>
</body>
</html>
